services:
  - type: web
    name: data-analysis-dashboard
    env: python
    rootDir: backend
    buildCommand: "./build.sh"
    startCommand: "gunicorn app:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: SECRET_KEY
        generateValue: true
    disk:
      name: data
      mountPath: /opt/render/project/src/backend/instance
      sizeGB: 1

  - type: web
    name: saleproject-frontend
    env: static
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: data-analysis-dashboard
          envVarKey: RENDER_EXTERNAL_URL
